name: Reporte Semanal de Tickets

on:
  schedule:
    - cron: '5 4 * * 1'  # Lunes 12:05 AM Bolivia (UTC-4 = 04:05 UTC)
  workflow_dispatch:        # También disparable manualmente

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Verificar entorno
        run: |
          node --version
          npm --version
          ls -la

      - name: Ejecutar reporte
        run: npm run send-official 2>&1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          FABRIC_MCP_URL: ${{ secrets.FABRIC_MCP_URL }}
          FABRIC_OPENAI_URL: ${{ secrets.FABRIC_OPENAI_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
          REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
